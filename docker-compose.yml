# ============================================
# License Server Docker Compose 配置
# ============================================
# 使用方法：
#   1. 推荐运行 ./deploy.sh，由脚本首次生成 .env 和密钥
#   2. 手动运行 docker compose 前，必须先准备 .env
#   3. 后续更新复用已有 .env，不要重新生成 LICENSE_MASTER_KEY
# ============================================

services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: ${INSTANCE_NAME:-license-server-ai}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-license_server}
      MYSQL_USER: ${MYSQL_USER:-license_admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: ${INSTANCE_NAME:-license-server-ai}-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 后端 API 服务 =====
  migrate:
    image: ghcr.io/longxingze0925/license-server-ai-backend:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: ${INSTANCE_NAME:-license-server-ai}-migrate
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      LICENSE_MASTER_KEY: ${LICENSE_MASTER_KEY}
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
    networks:
      - license-network
    command: ["-config", "/app/config.yaml", "-migrate"]

  backend:
    image: ghcr.io/longxingze0925/license-server-ai-backend:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: ${INSTANCE_NAME:-license-server-ai}-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      LICENSE_MASTER_KEY: ${LICENSE_MASTER_KEY}
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== 前端服务 =====
  frontend:
    image: ghcr.io/longxingze0925/license-server-ai-frontend:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: ${INSTANCE_NAME:-license-server-ai}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
      NGINX_MODE: http
      MAX_RELEASE_UPLOAD_MB: ${MAX_RELEASE_UPLOAD_MB:-500}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===== 数据卷 =====
volumes:
  mysql_data:
    name: ${INSTANCE_NAME:-license-server-ai}-mysql-data
  redis_data:
    name: ${INSTANCE_NAME:-license-server-ai}-redis-data

# ===== 网络 =====
networks:
  license-network:
    name: ${INSTANCE_NAME:-license-server-ai}-network
    driver: bridge
